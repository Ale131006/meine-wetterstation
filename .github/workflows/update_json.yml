name: Update JSON files

on:
  workflow_dispatch:
  #push:#
  schedule:
    - cron: "7 * * * *" # jede Stunde bei Minute 10

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Python-Skript ausführen
        run: python Python_Scripts/weather_predictions_final.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Data/json_data.json
          git diff --staged --quiet || git commit -m "Update JSON files"
          git push
